<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Mosque dome (main structure) -->
  <path d="M256 100 C256 100, 200 160, 200 200 L200 320 L312 320 L312 200 C312 160, 256 100, 256 100Z" fill="white" opacity="0.95"/>
  
  <!-- Minaret left -->
  <rect x="160" y="180" width="28" height="160" rx="4" fill="white" opacity="0.85"/>
  <path d="M174 180 C174 180, 160 150, 160 180Z" fill="white" opacity="0.85"/>
  <circle cx="174" cy="170" r="10" fill="url(#gold)"/>
  
  <!-- Minaret right -->
  <rect x="324" y="180" width="28" height="160" rx="4" fill="white" opacity="0.85"/>
  <path d="M338 180 C338 180, 352 150, 352 180Z" fill="white" opacity="0.85"/>
  <circle cx="338" cy="170" r="10" fill="url(#gold)"/>
  
  <!-- Crescent on dome -->
  <g transform="translate(256, 95)">
    <circle cx="0" cy="0" r="14" fill="url(#gold)"/>
    <circle cx="5" cy="-3" r="11" fill="#059669"/>
  </g>
  
  <!-- Mosque door -->
  <path d="M240 320 L240 270 Q256 250, 272 270 L272 320Z" fill="#059669" opacity="0.6"/>
  
  <!-- Windows -->
  <ellipse cx="224" cy="240" rx="10" ry="15" fill="#059669" opacity="0.4"/>
  <ellipse cx="288" cy="240" rx="10" ry="15" fill="#059669" opacity="0.4"/>
  
  <!-- Ground/Base line -->
  <rect x="120" y="320" width="272" height="8" rx="4" fill="white" opacity="0.5"/>
  
  <!-- River wave -->
  <path d="M100 370 Q160 355, 210 370 Q260 385, 310 370 Q360 355, 412 370" stroke="white" stroke-width="6" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M100 390 Q160 375, 210 390 Q260 405, 310 390 Q360 375, 412 390" stroke="white" stroke-width="4" fill="none" opacity="0.25" stroke-linecap="round"/>
  
  <!-- Trees (left) -->
  <circle cx="130" cy="280" r="22" fill="white" opacity="0.3"/>
  <circle cx="140" cy="265" r="18" fill="white" opacity="0.25"/>
  <rect x="133" y="295" width="6" height="25" rx="2" fill="white" opacity="0.25"/>

  <!-- Trees (right) -->
  <circle cx="382" cy="280" r="22" fill="white" opacity="0.3"/>
  <circle cx="372" cy="265" r="18" fill="white" opacity="0.25"/>
  <rect x="379" y="295" width="6" height="25" rx="2" fill="white" opacity="0.25"/>
  
  <!-- Bengali হা text -->
  <text x="256" y="445" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="64" fill="white" opacity="0.9">হাজিয়ান</text>
</svg>